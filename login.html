<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — SafeNet</title>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080b12;--bg2:#0e1420;--bg3:#141b28;--card:#0f1620;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--violet:#7c5cfc;--violet2:rgba(124,92,252,0.1);--red:#ff3d5a;--red2:rgba(255,61,90,0.1);--green:#00d48c;--green2:rgba(0,212,140,0.08);--text:#f0f4ff;--text2:#8492b0;--text3:#3d4d6a}
*{box-sizing:border-box}body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.mesh{position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(124,92,252,0.15),transparent);pointer-events:none;z-index:0}
.wrap{width:100%;max-width:420px;position:relative;z-index:1}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px;text-decoration:none}
.lm{width:36px;height:36px;background:linear-gradient(135deg,#7c5cfc,#5b3dd9);border-radius:10px;display:flex;align-items:center;justify-content:center}
.lm svg{width:20px;height:20px}
.ln{font-family:'Cabinet Grotesk',sans-serif;font-size:18px;font-weight:900;color:var(--text)}
.ln span{color:#7c5cfc}
.card{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:34px}
.card h1{font-family:'Cabinet Grotesk',sans-serif;font-size:24px;font-weight:900;margin-bottom:6px;letter-spacing:-.5px}
.card p{font-size:14px;color:var(--text2);margin-bottom:26px}
.benefits{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.benefit{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.check{color:var(--green);font-weight:700;font-size:15px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:7px}
.fc{width:100%;padding:12px 14px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:10px;color:var(--text);font-size:14px;font-family:'Instrument Sans',sans-serif;outline:none;transition:.2s}
.fc:focus{border-color:#7c5cfc}
.btn{width:100%;padding:13px;border:none;border-radius:11px;font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:15px;cursor:pointer;background:linear-gradient(135deg,#7c5cfc,#5b3dd9);color:#fff;margin-top:4px;transition:.2s;letter-spacing:-.2px}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(124,92,252,.3)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
.sw{text-align:center;font-size:14px;color:var(--text2);margin-top:18px}
.sw a{color:#7c5cfc;text-decoration:none;font-weight:600}
.err{background:var(--red2);border:1px solid rgba(255,61,90,.25);color:var(--red);padding:10px 14px;border-radius:9px;font-size:13px;margin-bottom:14px;display:none}
</style>
</head>
<body>
<div class="mesh"></div>
<div class="wrap">
  <a href="index.html" class="logo"><div class="lm"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg></div><span class="ln">Safe<span>Net</span></span></a>
  <div class="card">
    <h1>Welcome back</h1>
    <p>Sign in to your SafeNet account</p>
    <div class="err" id="err"></div>
    <div class="fg"><label>Email</label><input class="fc" id="email" type="email" placeholder="you@email.com" autofocus></div>
    <div class="fg"><label>Password</label><input class="fc" id="pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn" id="btn" onclick="doLogin()">Sign in →</button>
    <div class="sw">No account? <a href="register.html">Create one free</a></div>
  </div>
</div>
<script>
const API = window.location.origin;
const tok = localStorage.getItem('sn_token');
if (tok) { const u=JSON.parse(localStorage.getItem('sn_user')||'{}'); window.location.href=u.role==='admin'?'admin.html':'dashboard.html'; }
async function doLogin() {
  const email=document.getElementById('email').value.trim(), pass=document.getElementById('pass').value;
  const err=document.getElementById('err'), btn=document.getElementById('btn');
  err.style.display='none';
  if (!email||!pass){err.textContent='Please fill all fields';err.style.display='block';return;}
  btn.textContent='Signing in...';btn.disabled=true;
  try {
    localStorage.removeItem('sn_token');localStorage.removeItem('sn_user');
    const r=await fetch(`${API}/api/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    const d=await r.json();if(!r.ok)throw new Error(d.error);
    localStorage.setItem('sn_token',d.token);localStorage.setItem('sn_user',JSON.stringify(d.user));
    window.location.href=d.user.role==='admin'?'admin.html':'dashboard.html';
  } catch(e){err.textContent=e.message;err.style.display='block';btn.textContent='Sign in →';btn.disabled=false;}
}
</script>
</body>
</html>
